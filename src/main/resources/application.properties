spring.application.name=demo
server.port=8080

# JMeter 执行层配置
# 若已本地安装 JMeter，可指向安装目录以使用完整的 jmeter.properties（可选）
# jmeter.home=/path/to/apache-jmeter-5.6.3

# 最大并发执行任务数
jmeter.executor.max-concurrent=4

# 单个任务最大执行超时（秒）
jmeter.executor.timeout-seconds=300

# 关闭 JMeter 内置日志输出到控制台（避免日志污染）
logging.level.org.apache.jmeter=WARN
logging.level.org.apache.jorphan=WARN
